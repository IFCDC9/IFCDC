# IFCDC Headquarters — Render Blueprint
# GitHub: IFCDC9/IFCDC · Branch: main (production)
# NOTE: App lives at repository root (not monorepo Apps/ path).
# Render Root Directory must be blank (.) — NOT Apps/IMPERIAL-FOUNDATION-CDC.

services:
  - type: web
    name: ifcdc-hq
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm ci --include=dev && node script/render-build.mjs
    startCommand: node script/render-prestart.mjs && npm run start
    healthCheckPath: /api/health
    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: IFCDC_DATA_DIR
        value: /opt/render/project/src/data
      - key: JWT_SECRET
        generateValue: true
      - key: MASTER_OWNER_EMAIL
        value: "service@ifcdc.org"
      - key: FOUNDER_SEED_PASSWORD
        generateValue: true
      - key: GRANTS_OPERATOR_EMAIL
        value: "813786b@gmail.com"
      - key: GRANTS_OPERATOR_PASSWORD
        generateValue: true
      - key: GRANTS_OPERATOR_NAME
        value: "IFCDC Grants Operator"
      # AURA_OPENAI_API_KEY is the canonical production OpenAI key for every AURA
      # surface (Executive Chat, Grant Writer Studio, Full Proposal, AURA Voice,
      # Enterprise Intelligence). OPENAI_API_KEY is kept only as an automatic fallback.
      - key: AURA_OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_APP_URL
        value: https://ifcdc-hq-wst6.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://ifcdc-hq-wst6.onrender.com
      - key: HQ_SELF_HEALTH_URL
        value: https://ifcdc-hq-wst6.onrender.com/api/health
      - key: HQ_RADIO_HEALTH_URL
        value: https://ifcdc-hq-wst6.onrender.com/api/health
      - key: HQ_BARBERS_HEALTH_URL
        sync: false
      - key: IFCDC_NOTIFICATIONS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: GRANTS_GOV_SEARCH_KEYWORD
        value: "community development nonprofit"
      # GRANTS_GOV_API_KEY is NOT required for search2/fetchOpportunity (public Applicant APIs).
      # Only set if future S2S endpoints require X-Api-Key per https://grants.gov/api/api-guide
      - key: SAM_GOV_API_KEY
        sync: false
      - key: SAM_GOV_UEI
        sync: false
      - key: HQ_MUSIC_LAUNCH_URL
        sync: false
      - key: HQ_TAPIS_LAUNCH_URL
        sync: false
      - key: HQ_INCLUSIVE_LAUNCH_URL
        sync: false
      - key: HQ_SWIFTWARE_LAUNCH_URL
        sync: false
      - key: HQ_CRYPTO_LAUNCH_URL
        sync: false
      # Integrations Hub — GitHub API health probe (optional; deploy still uses Render native GitHub link)
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: IFCDC9
      - key: GITHUB_REPO
        value: IFCDC
      - key: GITHUB_BRANCH
        value: main
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: live
      # Twilio — AURA voice + SMS (+1 331-316-8167)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        value: "+13313168167"
      - key: TWILIO_SMS_FROM
        value: "+13313168167"
      - key: TWILIO_VOICE_FROM
        value: "+13313168167"
      - key: TWILIO_FROM_NUMBER
        value: "+13313168167"
      - key: PUBLIC_IFCDC_PHONE
        value: "+13313168167"
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false

    disk:
      name: ifcdc-hq-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5
