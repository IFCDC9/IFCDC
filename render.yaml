# IFCDC Headquarters — Render Blueprint
# Runbook: Documents/HQ-DEPLOY-RUNBOOK.md

services:
  - type: web
    name: ifcdc-hq
    runtime: node
    region: ohio
    plan: starter
    rootDir: Apps/IMPERIAL-FOUNDATION-CDC
    buildCommand: npm ci --include=dev && npm run build && node script/render-postbuild.mjs
    startCommand: node script/render-prestart.mjs && npm run start
    healthCheckPath: /api/health
    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        sync: false
      - key: MASTER_OWNER_EMAIL
        sync: false
      - key: FOUNDER_SEED_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

    disk:
      name: ifcdc-hq-data
      mountPath: /opt/render/project/src/Apps/IMPERIAL-FOUNDATION-CDC/data
      sizeGB: 1
