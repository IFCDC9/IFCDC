# IFCDC Headquarters — Render Blueprint
# GitHub: IFCDC9/IFCDC · Branch: main (production)
# Legacy branch: hq/phase3-people-operations (same tip as main after history unify)
# NOTE: App lives at repository root (not monorepo Apps/ path).
# Render Root Directory must be blank (.) — NOT Apps/IMPERIAL-FOUNDATION-CDC.

services:
  - type: web
    name: ifcdc-hq
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm ci && npm run build && node script/render-postbuild.mjs
    startCommand: node script/render-prestart.mjs && npm run start
    healthCheckPath: /api/health
    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        sync: false
      - key: MASTER_OWNER_EMAIL
        sync: false
      - key: FOUNDER_SEED_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

    disk:
      name: ifcdc-hq-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
