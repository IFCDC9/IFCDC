name: IFCDC CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: DATABASE_URL=postgresql://localhost/ifcdc npx prisma generate

      - name: Build @ifcdc workspace packages
        run: npm run build:packages

      - name: Type Check
        run: npm run check

      - name: Run Tests
        run: npm test

  grants-qa:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: DATABASE_URL=postgresql://localhost/ifcdc npx prisma generate

      - name: Build Application
        run: npm run build

      - name: Start Server for Grant QA
        run: |
          IFCDC_GRANTS_QA=1 \
          JWT_SECRET=ci-grants-qa-secret \
          FOUNDER_SEED_PASSWORD='CiGrantsQa!2026' \
          MASTER_OWNER_EMAIL=service@ifcdc.org \
          PUBLIC_APP_URL=http://127.0.0.1:5000 \
          node dist/index.cjs &
          echo $! > /tmp/ifcdc-server.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5000/api/health > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Grant Center QA Gate
        run: |
          IFCDC_GRANTS_QA=1 \
          IFCDC_BASE_URL=http://127.0.0.1:5000 \
          JWT_SECRET=ci-grants-qa-secret \
          FOUNDER_SEED_PASSWORD='CiGrantsQa!2026' \
          npm run grants:qa

      - name: Stop Server
        if: always()
        run: |
          if [ -f /tmp/ifcdc-server.pid ]; then
            kill "$(cat /tmp/ifcdc-server.pid)" || true
          fi
