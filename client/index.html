<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFCDC Portal</title>
    <meta name="description" content="IFCDC Policy Manual System" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a0a;
        color: #f5c842;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 1rem;
      }
      #root {
        min-height: 100vh;
        background: #0a0a0a;
      }
      @keyframes hq-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function () {
        var BOOT_MS = 8000;

        function showBootFallback() {
          if (window.__IFCDC_APP_MOUNTED__) return;
          var el = document.getElementById("app-boot");
          if (!el) return;
          el.innerHTML =
            '<div style="text-align:center;padding:2rem;max-width:420px">' +
            '<p style="margin-bottom:0.75rem">Still loading Headquarters…</p>' +
            '<p style="color:#888;font-size:0.85rem;margin-bottom:1rem">The server may be ready — try opening Login or HQ directly.</p>' +
            '<a href="/login" style="display:inline-block;margin:0.25rem 0.5rem;padding:0.6rem 1.2rem;background:#f5c842;color:#0a0a0a;border-radius:6px;text-decoration:none;font-weight:600">Enter Login</a>' +
            '<a href="/hq" style="display:inline-block;margin:0.25rem 0.5rem;padding:0.6rem 1.2rem;border:1px solid #f5c842;color:#f5c842;border-radius:6px;text-decoration:none">Open HQ</a>' +
            '<br/><button type="button" onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:transparent;border:1px solid #555;color:#aaa;border-radius:4px;cursor:pointer">Retry</button>' +
            "</div>";
        }

        var timer = setTimeout(showBootFallback, BOOT_MS);
        window.__IFCDC_CLEAR_BOOT_TIMER__ = function () {
          clearTimeout(timer);
        };
      })();
    </script>
  </head>
  <body>
    <div id="app-boot">Starting IFCDC Headquarters…</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
