<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | IFCDC</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .register-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--ifcdc-bg);
    }
    .register-page h2 {
      margin-bottom: 24px;
    }
    .register-page form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    .register-page input {
      padding: 12px;
      font-size: 1rem;
    }
    .register-page button {
      padding: 12px;
      font-size: 1rem;
    }
    .register-page p {
      margin-top: 20px;
    }
    .error-msg {
      color: #e53935;
      font-size: 0.9rem;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      width: 100%;
      max-width: 320px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #444;
    }
    .divider span {
      padding: 0 12px;
      color: #888;
      font-size: 0.85rem;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      padding: 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .google-btn:hover {
      background: #f5f5f5;
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
    }
    .google-btn.hidden {
      display: none;
    }
  </style>
</head>
<body class="ifcdc-body">
  <div class="register-page">
    <h2>Create Account</h2>

    <a href="/auth/google" class="google-btn hidden" id="googleBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google
    </a>

    <div class="divider" id="divider" style="display:none;">
      <span>or</span>
    </div>

    <form id="registerForm">
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirm" placeholder="Confirm Password" required />
      <p id="errorMsg" class="error-msg" style="display:none;"></p>
      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login.html">Login</a></p>
  </div>

  <script src="/register.js"></script>
  <script>
    fetch('/auth/google/available')
      .then(r => r.json())
      .then(data => {
        if (data.available) {
          document.getElementById('googleBtn').classList.remove('hidden');
          document.getElementById('divider').style.display = 'flex';
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
