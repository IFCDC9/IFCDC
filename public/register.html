<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | IFCDC</title>
  <meta name="description" content="Create an IFCDC account to access staff services and community programs." />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .auth-page {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: var(--ifcdc-card);
      border: 1px solid var(--ifcdc-border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .auth-card h1 {
      font-size: 1.75rem;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .auth-card .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    .auth-form label {
      display: block;
      margin-bottom: 6px;
      color: var(--ifcdc-gold);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: var(--ifcdc-gold);
      font-size: 1rem;
      box-sizing: border-box;
    }
    .auth-form input:focus {
      outline: none;
      border-color: var(--ifcdc-gold);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    .auth-form button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37 0%, #b8972e 100%);
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    .auth-form button:hover {
      background: linear-gradient(135deg, #e5c44b 0%, #d4af37 100%);
    }
    .auth-form button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .auth-error {
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid #dc3545;
      color: #ff6b6b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .auth-success {
      background: rgba(40, 167, 69, 0.15);
      border: 1px solid #28a745;
      color: #51cf66;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #333;
    }
    .auth-footer a {
      color: var(--ifcdc-gold);
    }
    .password-hint {
      font-size: 0.8rem;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body class="ifcdc-body">
  <header class="ifcdc-brand-header">
    <div class="ifcdc-brand-inner">
      <img src="/ifcdc-logo.png" alt="IFCDC Logo" class="ifcdc-logo" />
      <div class="ifcdc-brand-text">
        <div class="ifcdc-brand-name">Imperial Foundation Community Development Center</div>
        <div class="ifcdc-brand-tagline">IFCDC • Community • Development • Empowerment</div>
      </div>
    </div>
  </header>
  <nav class="ifcdc-header">
    <div class="ifcdc-header-inner">
      <div class="ifcdc-nav">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/programs.html">Programs</a>
        <a href="/contact.html">Contact</a>
      </div>
      <div class="auth-buttons">
        <a href="/login.html" class="btn btn-login">Login</a>
        <a href="/register.html" class="btn btn-register">Register</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join the IFCDC community</p>

      <div id="registerError" class="auth-error"></div>
      <div id="registerSuccess" class="auth-success"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Create a password" minlength="6" />
          <p class="password-hint">At least 6 characters</p>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password" />
        </div>
        <button type="submit">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login.html">Sign in here</a></p>
      </div>
    </div>
  </main>

  <script src="/auth.js"></script>
</body>
</html>
