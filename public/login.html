<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | IFCDC</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--ifcdc-bg);
    }
    .login-page h2 {
      margin-bottom: 24px;
    }
    .login-page form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    .login-page input {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page button {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page p {
      margin-top: 20px;
    }
  </style>
</head>
<body class="ifcdc-body">
  <div class="login-page">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register.html">Register</a></p>
  </div>

  <script src="/login.js"></script>
</body>
</html>
