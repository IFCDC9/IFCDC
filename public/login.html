<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | IFCDC</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--ifcdc-bg);
    }
    .login-page h2 {
      margin-bottom: 24px;
    }
    .login-page form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    .login-page input {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page button {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page p {
      margin-top: 20px;
    }
    .error-msg {
      color: #e53935;
      font-size: 0.9rem;
      margin-top: -8px;
    }
    .totp-section {
      display: none;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    .totp-section.show {
      display: flex;
    }
    .totp-section input {
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 8px;
    }
    .totp-info {
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body class="ifcdc-body">
  <div class="login-page">
    <h2>Login</h2>

    <form id="loginForm">
      <div id="credentialsSection">
        <input type="email" name="email" id="email" placeholder="Email" required style="width:100%;margin-bottom:16px" />
        <input type="password" name="password" id="password" placeholder="Password" required style="width:100%" />
      </div>
      
      <div id="totpSection" class="totp-section">
        <p class="totp-info">Enter the 6-digit code from your authenticator app</p>
        <input type="text" name="totpCode" id="totpCode" placeholder="000000" maxlength="6" pattern="[0-9]{6}" />
      </div>
      
      <p id="errorMsg" class="error-msg" style="display:none;"></p>
      
      <button type="submit" id="submitBtn">Login</button>
    </form>

    <p>Don't have an account? <a href="/register.html">Register</a></p>
  </div>

  <script src="/login.js"></script>
</body>
</html>
