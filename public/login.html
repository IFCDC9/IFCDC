<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | IFCDC</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--ifcdc-bg);
    }
    .login-page h2 {
      margin-bottom: 24px;
    }
    .login-page form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    .login-page input {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page button {
      padding: 12px;
      font-size: 1rem;
    }
    .login-page p {
      margin-top: 20px;
    }
    .error-msg {
      color: #e53935;
      font-size: 0.9rem;
      margin-top: -8px;
    }
    .totp-section {
      display: none;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    .totp-section.show {
      display: flex;
    }
    .totp-section input {
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 8px;
    }
    .totp-info {
      color: #888;
      font-size: 0.85rem;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      width: 100%;
      max-width: 320px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #444;
    }
    .divider span {
      padding: 0 12px;
      color: #888;
      font-size: 0.85rem;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      padding: 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .google-btn:hover {
      background: #f5f5f5;
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
    }
    .google-btn.hidden {
      display: none;
    }
  </style>
</head>
<body class="ifcdc-body">
  <div class="login-page">
    <h2>Login</h2>

    <form id="loginForm">
      <div id="credentialsSection">
        <input type="email" name="email" id="email" placeholder="Email" required style="width:100%;margin-bottom:16px" />
        <input type="password" name="password" id="password" placeholder="Password" required style="width:100%" />
      </div>
      
      <div id="totpSection" class="totp-section">
        <p class="totp-info">Enter the 6-digit code from your authenticator app</p>
        <input type="text" name="totpCode" id="totpCode" placeholder="000000" maxlength="6" pattern="[0-9]{6}" />
      </div>
      
      <p id="errorMsg" class="error-msg" style="display:none;"></p>
      
      <button type="submit" id="submitBtn">Login</button>
    </form>

    <div class="divider" id="divider" style="display:none;">
      <span>or</span>
    </div>

    <a href="/auth/google" class="google-btn hidden" id="googleBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <p>Don't have an account? <a href="/register.html">Register</a></p>
  </div>

  <script src="/login.js"></script>
  <script>
    // Check if Google OAuth is available and show button
    fetch('/auth/google/available')
      .then(r => r.json())
      .then(data => {
        if (data.available) {
          document.getElementById('googleBtn').classList.remove('hidden');
          document.getElementById('divider').style.display = 'flex';
        }
      })
      .catch(() => {});
    
    // Handle error messages from OAuth redirect
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
      const errorMsg = document.getElementById('errorMsg');
      const messages = {
        'google_not_configured': 'Google login is not available',
        'no_email': 'Could not get email from Google',
        'account_restricted': 'Your account is restricted',
        'oauth_failed': 'Login failed. Please try again.'
      };
      errorMsg.textContent = messages[error] || 'Login failed';
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
